<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spell Correction Engine</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#dbeafe,#f5f3ff);
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg,#2563eb,#9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 500px;
            margin: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        input {
            width: 85%;
            padding: 14px;
            font-size: 18px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #3b82f6;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background: linear-gradient(135deg,#3b82f6,#9333ea);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 25px;
        }

        .input-text {
            font-size: 20px;
            color: #374151;
        }

        .box {
            background: linear-gradient(135deg,#f8fafc,#eef2ff);
            margin: 12px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: left;
            transition: 0.2s;
        }

        .box:hover {
            transform: scale(1.03);
        }

        .word {
            font-size: 20px;
            font-weight: bold;
            color: #1f2937;
        }

        .meta {
            font-size: 14px;
            color: #6b7280;
        }

        .no-result {
            color: red;
            font-weight: bold;
            margin-top: 15px;
        }

    </style>
</head>

<body>

<h1>✨ Spell Correction Engine</h1>

<div class="card">

<form action="/check" method="post">
    <input type="text" name="word" placeholder="Enter a word..." required>
    <br>
    <button type="submit">Check Spelling</button>
</form>

<div class="result" th:if="${word}">
    <p class="input-text">You entered: <b th:text="${word}"></b></p>

    <div th:if="${#lists.isEmpty(suggestions)}" class="no-result">
        ❌ No suggestions found
    </div>

    <div th:each="s : ${suggestions}" class="box">
        <div class="word" th:text="${s.word}"></div>
        <div class="meta">
            Distance: <span th:text="${s.distance}"></span> |
            Similarity: <span th:text="${s.similarity}"></span>%
        </div>
    </div>

</div>

</div>

</body>
</html>
